<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Grid Editor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="panel">
      <h1>Simple Grid Editor</h1>

      <div class="section">
        <label class="label" for="filename">Project name</label>
        <input id="filename" type="text" value="grid-drawing" />
      </div>

      <div class="section">
        <h2>Tool</h2>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="line">Line</button>
          <button class="tool-btn" data-tool="rect">Rect</button>
          <button class="tool-btn" data-tool="polyline">Path</button>
          <button class="tool-btn" data-tool="select">Select</button>
        </div>
        <p class="small">For Path, click to place points and double-click to finish.</p>
      </div>

      <div class="section">
        <label class="label" for="colorPicker">Colour</label>
        <div class="row">
          <input id="colorPicker" type="color" value="#06b6d4" class="color-box" />
          <input id="colorText" type="text" value="#06b6d4" />
        </div>
        <div class="swatches" id="swatches"></div>
      </div>

      <div class="section">
        <label class="label" for="strokeWidth">Stroke width: <span id="strokeWidthLabel">3</span>px</label>
        <input id="strokeWidth" type="range" min="1" max="12" step="1" value="3" class="slider" />
      </div>

      <div class="section">
        <label class="label" for="gridSize">Grid size: <span id="gridSizeLabel">40</span>px</label>
        <input id="gridSize" type="range" min="10" max="100" step="5" value="40" class="slider" />
      </div>

      <div class="section">
        <label class="label" for="subDivisions">Sub-grid divisions</label>
        <select id="subDivisions">
          <option value="1">1 (no sub-grid)</option>
          <option value="2" selected>2</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="8">8</option>
        </select>
      </div>

      <div class="section">
        <label class="label" for="backgroundPicker">Background</label>
        <div class="row">
          <input id="backgroundPicker" type="color" value="#0f172a" class="color-box" />
          <input id="backgroundText" type="text" value="#0f172a" />
        </div>
      </div>

      <div class="section">
        <div class="toggle">
          <span>Show grid</span>
          <input id="showGrid" type="checkbox" checked />
        </div>
        <div class="toggle">
          <span>Snap to grid</span>
          <input id="snapToGrid" type="checkbox" checked />
        </div>
      </div>

      <div class="section btn-grid">
        <button id="undoBtn">Undo</button>
        <button id="deleteBtn">Delete selected</button>
        <button id="clearBtn" class="danger">Clear all</button>
      </div>

      <div class="section btn-grid">
        <button id="saveProjectBtn">Save project JSON</button>
        <button id="loadProjectBtn">Load project JSON</button>
        <input id="loadProjectInput" type="file" accept=".json,.grid.json,application/json" hidden />
        <button id="exportSvgBtn">Export SVG</button>
        <button id="exportPngBtn">Export PNG</button>
      </div>

      <p class="small">
        Ctrl/Cmd+Z undoes. Escape cancels current drawing. Delete removes the selected shape.<br>
        Save JSON for re-editing later. Export SVG or PNG for finished output.
      </p>
    </div>

    <div class="panel canvas-panel">
      <h1>Canvas</h1>
      <div class="canvas-wrap">
        <svg id="editorSvg" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
