<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Perfection</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #ui-panel {
            margin-bottom: 20px;
            background: rgba(30, 30, 30, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            text-align: center;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        #title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        label {
            margin-right: 10px;
            cursor: pointer;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #e50914;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

            button:hover {
                background: #ff1e27;
            }

        #stats {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 8px;
            color: #ddd;
            font-size: 14px;
        }

        .stat-column {
            flex: 1;
            text-align: left;
            min-width: 110px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.03);
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: auto;
        }

        #canvas {
            background: transparent;
            width: 100%;
            height: auto;
            touch-action: none;
            display: block;
        }

        #display-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }

        .success {
            color: #2ecc71;
        }

        .great {
            color: #f1c40f;
            text-shadow: 0 0 12px #f1c40f;
        }

        .fail {
            color: #e74c3c;
        }

        .countdown {
            color: #e67e22;
            font-size: 40px;
        }

        #instructions {
            margin-top: 12px;
            color: #888;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div id="title">Zone Perfection</div>
        <div class="controls">
            <label><input type="checkbox" id="use-countdown" checked> Use Countdown</label>
            <label><input type="checkbox" id="pause-on-success"> Pause on Success</label>
            <button id="start-btn">Trigger Skill Check</button>
            <button id="reset-stats-btn">Reset Stats</button>
        </div>

        <div id="stats">
            <div class="stat-column">
                <div class="stat-row"><div>Attempts</div><div id="stat-attempts">0</div></div>
                <div class="stat-row"><div>Successes</div><div id="stat-successes">0</div></div>
                <div class="stat-row"><div>Greats</div><div id="stat-greats">0</div></div>
            </div>
            <div class="stat-column">
                <div class="stat-row"><div>Misses</div><div id="stat-fails">0</div></div>
                <div class="stat-row"><div>Accuracy</div><div id="stat-accuracy">0.0%</div></div>
                <div class="stat-row"><div>PB (Best Streak)</div><div id="stat-best">0</div></div>
            </div>
            <div class="stat-column" style="text-align:right;">
                <div class="stat-row"><div>Current Streak</div><div id="stat-streak">0</div></div>
            </div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="canvas" width="500" height="500"></canvas>
        <div id="display-text"></div>
    </div>

    <div id="instructions">Press <strong>SPACEBAR</strong> or tap the play area (below the stats) to hit the skill check!</div>

    <script>
        const canvas = document.getElementById('canvas');
        const playArea = document.getElementById('game-container');
        const displayText = document.getElementById('display-text');
        const startBtn = document.getElementById('start-btn');
        const resetStatsBtn = document.getElementById('reset-stats-btn');
        const useCountdownCheckbox = document.getElementById('use-countdown');
        const pauseOnSuccessCheckbox = document.getElementById('pause-on-success');

        const statAttempts = document.getElementById('stat-attempts');
        const statSuccesses = document.getElementById('stat-successes');
        const statGreats = document.getElementById('stat-greats');
        const statFails = document.getElementById('stat-fails');
        const statAccuracy = document.getElementById('stat-accuracy');
        const statStreak = document.getElementById('stat-streak');
        const statBest = document.getElementById('stat-best');

        const CANVAS_SIZE = 500;
        const centerX = CANVAS_SIZE / 2;
        const centerY = CANVAS_SIZE / 2;
        const radius = 160;
        const pointerLineInset = 12;
        const pointerLineOutset = 12;

        let isActive = false;
        let isCountingDown = false;
        let isWaitingForRestart = false;
        let isDisplayingResult = false;
        let pointerAngle = -Math.PI / 2;
        const speed = 0.07;
        let activeRunStartAngle = pointerAngle;
        let pointerFrozen = false;
        let animationStarted = false;

        let successStart = 0, successEnd = 0, greatStart = 0, greatEnd = 0;

        const stats = { attempts: 0, successes: 0, greats: 0, fails: 0, currentStreak: 0, bestStreak: 0 };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function playWarningBeep() { playSound(550, 'sine', 0.3); }
        function playSuccessSound(isGreat) { if (isGreat) { playSound(880, 'triangle', 0.15); setTimeout(() => playSound(1200, 'triangle', 0.2), 80); } else playSound(660, 'sine', 0.2); }
        function playFailSound() { playSound(150, 'sawtooth', 0.4); }

        function normalizeAngle(angle) { const twoPI = Math.PI * 2; let a = angle % twoPI; if (a < 0) a += twoPI; return a; }
        function isAngleInRange(angle, start, end) { if (start <= end) return angle >= start && angle <= end; return angle >= start || angle <= end; }

        function generateZones() {
            const randomOffset = Math.random() * (Math.PI * 1.2) + 0.3;
            successStart = pointerAngle + randomOffset;
            successEnd = successStart + 0.5;
            greatStart = successStart;
            greatEnd = greatStart + 0.12;
        }

        function updateStatsDisplay() {
            statAttempts.textContent = stats.attempts;
            statSuccesses.textContent = stats.successes;
            statGreats.textContent = stats.greats;
            statFails.textContent = stats.fails;
            statStreak.textContent = stats.currentStreak;
            statBest.textContent = stats.bestStreak;
            const acc = stats.attempts ? ((stats.successes / stats.attempts) * 100) : 0;
            statAccuracy.textContent = acc.toFixed(1) + '%';
        }
        function resetStats() { stats.attempts = 0; stats.successes = 0; stats.greats = 0; stats.fails = 0; stats.currentStreak = 0; stats.bestStreak = 0; updateStatsDisplay(); }

        function startSkillCheck(resetPointer = true) {
            if (isActive || isCountingDown || isDisplayingResult) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            displayText.className = ''; displayText.innerHTML = ''; isWaitingForRestart = false;
            if (resetPointer) pointerAngle = -Math.PI / 2;
            generateZones(); ensureAnimation();
            if (useCountdownCheckbox.checked) { pointerFrozen = true; runCountdown(3); } else { pointerFrozen = false; triggerActiveCheck(); }
        }
        function runCountdown(seconds) {
            isCountingDown = true; isActive = false;
            displayText.className = 'countdown';
            if (seconds > 0) { displayText.innerHTML = seconds; playSound(400, 'sine', 0.1); setTimeout(() => runCountdown(seconds - 1), 1000); }
            else { isCountingDown = false; displayText.className = ''; displayText.innerHTML = ''; pointerFrozen = false; triggerActiveCheck(); }
        }
        function triggerActiveCheck() { isActive = true; isWaitingForRestart = false; activeRunStartAngle = pointerAngle; playWarningBeep(); }

        const ctx = canvas.getContext('2d');
        function drawWheel() {
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, Math.PI * 2); ctx.strokeStyle = '#333'; ctx.lineWidth = 18; ctx.stroke();
            ctx.beginPath(); ctx.arc(centerX, centerY, radius, successStart, successEnd); ctx.strokeStyle = '#b3b3b3'; ctx.lineWidth = 20; ctx.stroke();
            ctx.beginPath(); ctx.arc(centerX, centerY, radius, greatStart, greatEnd); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 20; ctx.stroke();
            ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(pointerAngle);
            ctx.beginPath(); const inner = radius - pointerLineInset; const outer = radius + pointerLineOutset;
            ctx.moveTo(inner, 0); ctx.lineTo(outer, 0); ctx.lineWidth = 6; ctx.strokeStyle = '#ff3333'; ctx.shadowBlur = 12; ctx.shadowColor = '#ff3333'; ctx.stroke();
            ctx.restore();
        }

        function ensureAnimation() {
            if (animationStarted) return;
            animationStarted = true;
            function loop() {
                if (!isCountingDown && !pointerFrozen && !isDisplayingResult && !isWaitingForRestart) {
                    pointerAngle += speed;
                }
                drawWheel();
                if (isActive) {
                    if (pointerAngle > activeRunStartAngle + Math.PI * 2) {
                        resolveSkillCheck('fail', true);
                    }
                }
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }

        function resolveSkillCheck(forcedResult = null, auto = false) {
            if (!isActive) return;
            isActive = false;
            // Freeze pointer while we evaluate
            pointerFrozen = true;

            let result = forcedResult;
            if (!result) {
                const currentNorm = normalizeAngle(pointerAngle + Math.PI / 2);
                const sStart = normalizeAngle(successStart + Math.PI / 2);
                const sEnd = normalizeAngle(successEnd + Math.PI / 2);
                const gStart = normalizeAngle(greatStart + Math.PI / 2);
                const gEnd = normalizeAngle(greatEnd + Math.PI / 2);
                if (isAngleInRange(currentNorm, gStart, gEnd)) result = 'great';
                else if (isAngleInRange(currentNorm, sStart, sEnd)) result = 'success';
                else result = 'fail';
            }

            // Update stats
            stats.attempts++;
            if (result === 'great') { stats.greats++; stats.successes++; stats.currentStreak++; }
            else if (result === 'success') { stats.successes++; stats.currentStreak++; }
            else { stats.fails++; stats.currentStreak = 0; }
            if (stats.currentStreak > stats.bestStreak) stats.bestStreak = stats.currentStreak;
            updateStatsDisplay();

            if (result === 'fail') {
                displayText.className = 'fail';
                displayText.innerHTML = 'Explosion!';
                playFailSound();
                isWaitingForRestart = true;
                // pointerFrozen remains true until player starts next run
            } else {
                // success / great
                displayText.className = (result === 'great') ? 'great' : 'success';
                displayText.innerHTML = (result === 'great') ? 'Great Skill Check!' : 'Success!';
                playSuccessSound(result === 'great');

                if (pauseOnSuccessCheckbox.checked) {
                    // Pause FOR 1 second, then automatically continue (pointer frozen during the 1s)
                    isDisplayingResult = true;
                    setTimeout(() => {
                        displayText.className = ''; displayText.innerHTML = ''; isDisplayingResult = false;
                        generateZones();
                        pointerFrozen = false;
                        triggerActiveCheck();
                    }, 1000);
                } else {
                    // No pause: immediately start next round (pointer resumes); show message visually for 1s while pointer moves
                    generateZones();
                    pointerFrozen = false;
                    triggerActiveCheck();
                    isDisplayingResult = true;
                    setTimeout(() => {
                        displayText.className = ''; displayText.innerHTML = ''; isDisplayingResult = false;
                    }, 1);
                }
            }
        }

        function handlePlayAreaTap() {
            if (isActive) { resolveSkillCheck(); return; }
            if (isWaitingForRestart) { isWaitingForRestart = false; startSkillCheck(false); return; }
            if (!isCountingDown && !isDisplayingResult) { startSkillCheck(true); }
        }

        playArea.addEventListener('pointerdown', (e) => {
            if (e.button && e.button !== 0) return;
            e.preventDefault();
            handlePlayAreaTap();
        }, { passive: false });

        playArea.addEventListener('touchstart', (e) => {
            if (e.touches && e.touches[0]) { e.preventDefault(); handlePlayAreaTap(); }
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isActive) { resolveSkillCheck(); return; }
                if (isWaitingForRestart) { isWaitingForRestart = false; startSkillCheck(false); return; }
                if (!isCountingDown && !isDisplayingResult) { startSkillCheck(true); }
            }
        });

        startBtn.addEventListener('click', () => startSkillCheck(true));
        resetStatsBtn.addEventListener('click', resetStats);

        updateStatsDisplay();
        drawWheel();
        pointerFrozen = true;
    </script>
</body>
</html>
