<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Retro Game Framework</title>
  <style>
    :root {
      /* Shared colour palette for the wrapper and controls. */
      --bg: #101414;
      --panel: #182020;
      --panel-border: #2b3b3b;
      --text: #d7f5dd;
      --accent: #57ff93;
      --danger: #ff5f5f;
      --btn: #273232;
      --btn-active: #3a4b4b;
      --shadow: rgba(0, 0, 0, 0.35);

      /* Responsive control sizing.
         The middle utility area is a slim 1x3 strip for Start/Select.
         clamp(min, preferred, max) lets controls grow on larger screens
         while staying usable on smaller phones. */
      --control-cell: clamp(54px, 9vw, 96px);
      --control-gap: clamp(2px, 0.6vw, 4px);
      --utility-cell: clamp(36px, 9vw, 96px);
      --outer-pad: clamp(6px, 1.5vw, 16px);
      --topbar-btn: clamp(40px, 5vw, 44px);
    }

    * {
      /* Keep layout maths predictable when padding and borders are used. */
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #182121, #0d1111 55%);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      touch-action: manipulation;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    #app {
      width: 100%;
      max-width: 1180px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 10px;
      gap: 10px;

      /* Anchor absolute-positioned UI such as the burger menu popup. */
      position: relative;
    }

    .panel {
      /* Shared retro-window style for all wrapper panels. */
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.12));
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: 0 10px 30px var(--shadow);
    }

    #topBar {
      /* Menu button, title, close button. */
      display: grid;
      grid-template-columns: var(--topbar-btn) 1fr var(--topbar-btn);
      align-items: center;
      min-height: 56px;
      padding: 6px;
      gap: 8px;
    }

    #menuPanel {
      /* Float the menu above the layout instead of pushing content downward. */
      position: absolute;
      top: 74px;
      left: 10px;
      z-index: 30;
      padding: 8px;
      width: min(260px, calc(100% - 20px));
    }

    #menuInner {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #294040;
      background: rgba(18, 28, 28, 0.92);
    }

    .menuHeading {
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      color: #b7ffd0;
    }

    .menuOption {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .menuOption input {
      accent-color: #57ff93;
    }

    #titleBox {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #294040;
      background: rgba(18, 28, 28, 0.92);
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    #gameFrame {
      /* Outer shell around the playable canvas. */
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    canvas {
      display: block;
      width: min(100%, 1120px);
      height: auto;
      aspect-ratio: 1 / 1;
      background: #000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #1d2a2a;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    #statusBox,
    #controlRow,
    #instructionsPanel {
      padding: 8px;
    }

    #statusInner,
    #instructionsBox {
      /* These are plain HTML information panels rather than sprite-text panels. */
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #294040;
      background: rgba(18, 28, 28, 0.92);
      text-align: center;
      line-height: 1.35;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }

    #instructionsBox {
      font-size: clamp(14px, 2.2vw, 20px);
    }

    #statusInner {
      font-size: clamp(16px, 2.3vw, 22px);
    }

    #controlRow {
      /* Three control zones:
         left   = d-pad 3x3
         centre = utility 1x3 with Start / Select
         right  = action 3x3 with Y/X/B/A labels

         centre column:
         [START]
         [     ]
         [SELECT]

         default action pad:
         [ ][Y][ ]
         [X][ ][B]
         [ ][A][ ]

         reversed action pad:
         [ ][X][ ]
         [Y][ ][A]
         [ ][B][ ] */
      display: grid;
      grid-template-columns: minmax(0, 1fr) max-content minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    #leftControls,
    #centerControls,
    #rightControls {
      display: flex;
      align-items: center;
      min-height: calc(var(--control-cell) * 3 + var(--control-gap) * 2 + 16px);
    }

    #leftControls {
      justify-content: flex-start;
      padding-left: var(--outer-pad);
    }

    #centerControls {
      justify-content: center;
      padding-left: 4px;
      padding-right: 4px;
    }

    #rightControls {
      justify-content: flex-end;
      padding-right: var(--outer-pad);
    }

    .controlGrid {
      /* Visible border around each 3x3 control block for clearer grouping. */
      padding: 4px;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      background: rgba(20, 30, 30, 0.6);
      display: grid;
      grid-template-columns: repeat(3, var(--control-cell));
      grid-template-rows: repeat(3, var(--control-cell));
      gap: var(--control-gap);
      width: max-content;
    }

    .utilityStrip {
      /* Slim 1x3 utility strip for Start and Select. */
      padding: 4px;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      background: rgba(20, 30, 30, 0.6);
      display: grid;
      grid-template-columns: var(--utility-cell);
      grid-template-rows: repeat(3, var(--utility-cell));
      gap: var(--control-gap);
      width: max-content;
    }

    .btn,
    .ghost {
      /* Base button style used for all visible controls and hidden spacer cells. */
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: clamp(12px, 1.7vw, 18px);
      background: var(--btn);
      color: var(--text);
      font-size: clamp(18px, 2.5vw, 26px);
      font-weight: bold;
      box-shadow: 0 4px 12px var(--shadow), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      touch-action: manipulation;
      cursor: pointer;
    }

    .btn:active,
    .btn.active {
      /* Visual feedback for touch and mouse presses. */
      transform: translateY(1px) scale(0.98);
      background: var(--btn-active);
    }

    .fire {
      /* Circular buttons give the action pad a different visual identity. */
      border-radius: 50%;
      font-size: clamp(18px, 2.3vw, 22px);
    }

    .utilityBtn {
      /* Start / Select use a different shape so they read as system buttons. */
      border-radius: 999px;
      font-size: clamp(10px, 1.2vw, 12px);
      letter-spacing: 0.08em;
      padding: 0 4px;
    }

    .fireA {
      background: #254d2f;
    }

    .fireB {
      background: #5a2f1f;
    }

    .fireX {
      background: #2d355a;
    }

    .fireY {
      background: #5a5330;
    }

    /* Default face-button labels. Physical button positions stay fixed.
       Only the labels change when reverse mode is toggled. */
    #actionPad .label-y::before { content: 'Y'; }
    #actionPad .label-x::before { content: 'X'; }
    #actionPad .label-b::before { content: 'B'; }
    #actionPad .label-a::before { content: 'A'; }

    /* Reversed labels. */
    #actionPad.reversed .label-y::before { content: 'X'; }
    #actionPad.reversed .label-x::before { content: 'Y'; }
    #actionPad.reversed .label-b::before { content: 'A'; }
    #actionPad.reversed .label-a::before { content: 'B'; }

    .face-label {
      display: inline-block;
      line-height: 1;
    }

    .iconBtn {
      /* Menu and close buttons in the title bar. */
      width: var(--topbar-btn);
      height: var(--topbar-btn);
      border-radius: 12px;
      font-size: clamp(18px, 2vw, 20px);
    }

    .ghost {
      /* Hidden placeholders preserve control geometry without being clickable. */
      visibility: hidden;
      pointer-events: none;
    }

    @media (max-width: 860px) {
      #menuPanel {
        top: 68px;
        left: 8px;
        width: min(240px, calc(100% - 16px));
      }

      #app {
        padding: 8px;
      }

      #topBar {
        min-height: 52px;
      }

      #titleBox {
        min-height: 38px;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
      }

      #controlRow {
        /* A narrow utility strip in the middle keeps this three-column layout viable. */
        gap: 8px;
      }

      #leftControls {
        padding-left: 8px;
      }

      #centerControls {
        padding-left: 2px;
        padding-right: 2px;
      }

      #rightControls {
        padding-right: 8px;
      }

      #instructionsBox,
      #statusInner {
        min-height: 48px;
      }
    }

    @media (max-width: 520px) {
      :root {
        /* On narrower phones, reduce sizes just enough to avoid overlap. */
        --control-cell: clamp(42px, 12vw, 66px);
        --control-gap: clamp(2px, 0.5vw, 4px);
        --utility-cell: clamp(28px, 7vw, 40px);
        --outer-pad: clamp(4px, 1vw, 8px);
      }

      #controlRow {
        gap: 4px;
      }

      .utilityBtn {
        font-size: 9px;
      }

      #instructionsBox {
        font-size: 13px;
      }

      #statusInner {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topBar" class="panel">
      <button id="menuButton" class="btn iconBtn" type="button" aria-label="Menu">☰</button>
      <div id="titleBox">RETRO FRAMEWORK DEMO</div>
      <button id="closeButton" class="btn iconBtn" type="button" aria-label="Close">✕</button>
    </div>

    <!-- Simple popup menu attached to the burger button.
         Hidden by default and used for layout/config toggles. -->
    <div id="menuPanel" class="panel" hidden>
      <div id="menuInner">
        <div class="menuHeading">OPTIONS</div>
        <label class="menuOption">
          <input type="checkbox" id="reverseToggle" />
          <span>REVERSE BUTTONS</span>
        </label>
      </div>
    </div>

    <div id="gameFrame" class="panel">
      <canvas id="game" aria-label="Game canvas"></canvas>
    </div>

    <div id="statusBox" class="panel">
      <div id="statusInner">STATUS: READY</div>
    </div>

    <div id="controlRow" class="panel">
      <div id="leftControls">
        <!-- D-pad uses a 3x3 grid with hidden cells to preserve the cross shape. -->
        <div class="controlGrid" id="dpad">
          <div class="ghost"></div>
          <button class="btn" data-key="ArrowUp" type="button" aria-label="Up">▲</button>
          <div class="ghost"></div>

          <button class="btn" data-key="ArrowLeft" type="button" aria-label="Left">◀</button>
          <div class="ghost"></div>
          <button class="btn" data-key="ArrowRight" type="button" aria-label="Right">▶</button>

          <div class="ghost"></div>
          <button class="btn" data-key="ArrowDown" type="button" aria-label="Down">▼</button>
          <div class="ghost"></div>
        </div>
      </div>

      <div id="centerControls">
        <!-- Utility strip now exposes Start and Select as real engine inputs. -->
        <div class="utilityStrip" id="utilityPad">
          <button class="btn utilityBtn" data-key="Enter" type="button" aria-label="Start">START</button>
          <div class="ghost"></div>
          <button class="btn utilityBtn" data-key="ShiftLeft" type="button" aria-label="Select">SELECT</button>
        </div>
      </div>

      <div id="rightControls">
        <!-- Action pad layout:
             default:
             [ ][Y][ ]
             [X][ ][B]
             [ ][A][ ]

             reversed:
             [ ][X][ ]
             [Y][ ][A]
             [ ][B][ ] -->
        <div class="controlGrid" id="actionPad">
          <div class="ghost"></div>
          <button class="btn fire fireY label-y" data-key="KeyS" type="button" aria-label="Top face button"><span class="face-label"></span></button>
          <div class="ghost"></div>

          <button class="btn fire fireX label-x" data-key="KeyA" type="button" aria-label="Left face button"><span class="face-label"></span></button>
          <div class="ghost"></div>
          <button class="btn fire fireB label-b" data-key="KeyX" type="button" aria-label="Right face button"><span class="face-label"></span></button>

          <div class="ghost"></div>
          <button class="btn fire fireA label-a" data-key="KeyZ" type="button" aria-label="Bottom face button"><span class="face-label"></span></button>
          <div class="ghost"></div>
        </div>
      </div>
    </div>

    <div id="instructionsPanel" class="panel">
      <div id="instructionsBox">
        ARROWS OR DPAD TO MOVE. HOLD A TO DRAW. START PAUSES. SELECT IS AVAILABLE FOR SECONDARY FUNCTIONS.
      </div>
    </div>
  </div>

  <script>
    class InputManager {
      constructor() {
        // Current pressed state for each logical input code.
        this.keys = new Map();

        // Inputs that changed from up to down this frame only.
        this.justPressed = new Set();

        // References to all on-screen buttons once bound.
        this.mobileButtons = [];

        this.setupKeyboard();
      }

      setupKeyboard() {
        window.addEventListener('keydown', (e) => {
          const code = e.code;

          // Prevent browser scrolling or default actions for control keys.
          if ([
            'ArrowUp',
            'ArrowDown',
            'ArrowLeft',
            'ArrowRight',
            'Space',
            'Enter',
            'Escape',
            'ShiftLeft',
            'KeyP',
            'KeyA',
            'KeyS',
            'KeyZ',
            'KeyX'
          ].includes(code)) {
            e.preventDefault();
          }

          // Treat P as a Start alias so keyboard pause matches the on-screen Start button.
          const logicalCode = code === 'KeyP' ? 'Enter' : code;

          if (!this.keys.get(logicalCode)) {
            this.justPressed.add(logicalCode);
          }
          this.keys.set(logicalCode, true);
        });

        window.addEventListener('keyup', (e) => {
          const logicalCode = e.code === 'KeyP' ? 'Enter' : e.code;
          this.keys.set(logicalCode, false);
        });
      }

      bindTouchButtons(selector = '[data-key]') {
        this.mobileButtons = [...document.querySelectorAll(selector)];

        const press = (button, e) => {
          e.preventDefault();
          const code = button.dataset.key;

          if (!this.keys.get(code)) {
            this.justPressed.add(code);
          }
          this.keys.set(code, true);
          button.classList.add('active');
        };

        const release = (button, e) => {
          e.preventDefault();
          const code = button.dataset.key;
          this.keys.set(code, false);
          button.classList.remove('active');
        };

        for (const button of this.mobileButtons) {
          // Touch listeners for phones/tablets.
          button.addEventListener('touchstart', (e) => press(button, e), { passive: false });
          button.addEventListener('touchend', (e) => release(button, e), { passive: false });
          button.addEventListener('touchcancel', (e) => release(button, e), { passive: false });

          // Mouse listeners are still useful for desktop testing.
          button.addEventListener('mousedown', (e) => press(button, e));
          button.addEventListener('mouseup', (e) => release(button, e));
          button.addEventListener('mouseleave', (e) => release(button, e));
        }
      }

      pollGamepad() {
        const pads = navigator.getGamepads ? navigator.getGamepads() : [];
        const pad = pads && pads[0];
        if (!pad) return;

        // Dead zone avoids unwanted analogue drift.
        const dead = 0.35;
        const gamepadStates = {
          ArrowLeft: pad.axes[0] < -dead || !!pad.buttons[14]?.pressed,
          ArrowRight: pad.axes[0] > dead || !!pad.buttons[15]?.pressed,
          ArrowUp: pad.axes[1] < -dead || !!pad.buttons[12]?.pressed,
          ArrowDown: pad.axes[1] > dead || !!pad.buttons[13]?.pressed,
          KeyZ: !!pad.buttons[0]?.pressed,
          KeyX: !!pad.buttons[1]?.pressed,
          KeyA: !!pad.buttons[2]?.pressed,
          KeyS: !!pad.buttons[3]?.pressed,
          ShiftLeft: !!pad.buttons[8]?.pressed,
          Enter: !!pad.buttons[9]?.pressed,
        };

        for (const [code, pressed] of Object.entries(gamepadStates)) {
          if (pressed && !this.keys.get(code)) {
            this.justPressed.add(code);
          }
          this.keys.set(code, !!pressed);
        }
      }

      down(code) {
        return !!this.keys.get(code);
      }

      pressed(code) {
        return this.justPressed.has(code);
      }

      endFrame() {
        this.justPressed.clear();
      }
    }

    class Scene {
      enter(engine) {}
      update(engine, dt) {}
      draw(engine, ctx) {}
      exit(engine) {}
    }

    class DemoScene extends Scene {
      enter(engine) {
        this.player = {
          x: 232,
          y: 232,
          w: 16,
          h: 16,
          speed: 96,
          drawing: false,
          altAction: false,
          extraX: false,
          extraY: false,
          selecting: false,
          paused: false,
          trail: [],
        };
        this.score = 0;
      }

      update(engine, dt) {
        const input = engine.input;
        const p = this.player;

        // Start toggles pause. Keyboard P is treated as Start by the input layer.
        if (input.pressed('Enter')) {
          p.paused = !p.paused;
        }

        // Select is a real input now, ready for future inventory/menu/secondary uses.
        p.selecting = input.down('ShiftLeft');

        if (!p.paused) {
          if (input.down('ArrowLeft')) p.x -= p.speed * dt;
          if (input.down('ArrowRight')) p.x += p.speed * dt;
          if (input.down('ArrowUp')) p.y -= p.speed * dt;
          if (input.down('ArrowDown')) p.y += p.speed * dt;

          // Clamp the player to the visible game area.
          p.x = Math.max(8, Math.min(engine.baseWidth - 8 - p.w, p.x));
          p.y = Math.max(8, Math.min(engine.baseHeight - 8 - p.h, p.y));

          p.drawing = input.down('KeyZ');
          p.altAction = input.down('KeyX');
          p.extraX = input.down('KeyA');
          p.extraY = input.down('KeyS');

          if (p.drawing) {
            p.trail.push({
              x: p.x + p.w / 2,
              y: p.y + p.h / 2,
              life: 0.24,
            });
            this.score += dt * 10;
          }

          for (const t of p.trail) {
            t.life -= dt;
          }
          p.trail = p.trail.filter((t) => t.life > 0);
        } else {
          p.drawing = false;
          p.altAction = false;
          p.extraX = false;
          p.extraY = false;
        }

        // Status text now reports Start / Select explicitly so games can rely on them later.
        const statusText = p.paused
          ? 'STATUS: PAUSED'
          : p.selecting
            ? 'STATUS: SELECT HELD'
            : p.altAction
              ? 'STATUS: BUTTON B HELD'
              : p.drawing
                ? 'STATUS: BUTTON A HELD'
                : p.extraX
                  ? 'STATUS: BUTTON X HELD'
                  : p.extraY
                    ? 'STATUS: BUTTON Y HELD'
                    : 'STATUS: READY';

        const instructionsText = p.paused
          ? 'PRESS START AGAIN TO RESUME. SELECT IS AVAILABLE FOR SECONDARY FUNCTIONS.'
          : p.selecting
            ? 'SELECT IS CURRENTLY ACTIVE. YOU CAN REUSE IT FOR MAP, INVENTORY, OR MODE SWITCHES.'
            : p.altAction
              ? 'B CAN TRIGGER A SECOND ACTION, MENU, BOMB, OR CANCEL LATER.'
              : 'ARROWS OR DPAD TO MOVE. HOLD A TO DRAW. START PAUSES. SELECT IS AVAILABLE FOR SECONDARY FUNCTIONS.';

        engine.setStatus(statusText);
        engine.setInstructions(instructionsText);
      }

      draw(engine, ctx) {
        const p = this.player;
        ctx.fillStyle = '#050707';
        ctx.fillRect(0, 0, engine.baseWidth, engine.baseHeight);

        ctx.strokeStyle = '#0f1717';
        for (let x = 0; x <= engine.baseWidth; x += 16) {
          ctx.beginPath();
          ctx.moveTo(x + 0.5, 0);
          ctx.lineTo(x + 0.5, engine.baseHeight);
          ctx.stroke();
        }

        for (let y = 0; y <= engine.baseHeight; y += 16) {
          ctx.beginPath();
          ctx.moveTo(0, y + 0.5);
          ctx.lineTo(engine.baseWidth, y + 0.5);
          ctx.stroke();
        }

        for (const t of p.trail) {
          const alpha = Math.max(0, t.life / 0.24);
          ctx.fillStyle = `rgba(87,255,147,${0.35 * alpha})`;
          ctx.fillRect(Math.round(t.x - 1), Math.round(t.y - 1), 3, 3);
        }

        // The player colour reflects current action state. */
        ctx.fillStyle = p.paused
          ? '#9ba7a7'
          : p.selecting
            ? '#9f7cff'
            : p.altAction
              ? '#ff9f57'
              : p.drawing
                ? '#ff7070'
                : '#57ff93';
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.w, p.h);

        ctx.fillStyle = '#b7ffd0';
        ctx.fillRect(Math.round(p.x + 4), Math.round(p.y + 4), 2, 2);
        ctx.fillRect(Math.round(p.x + 10), Math.round(p.y + 4), 2, 2);

        if (p.paused) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
          ctx.fillRect(0, 0, engine.baseWidth, engine.baseHeight);
          ctx.fillStyle = '#d7f5dd';
          ctx.fillRect(engine.baseWidth / 2 - 12, engine.baseHeight / 2 - 20, 8, 40);
          ctx.fillRect(engine.baseWidth / 2 + 4, engine.baseHeight / 2 - 20, 8, 40);
        }
      }
    }

    class GameEngine {
      constructor(options = {}) {
        this.baseWidth = options.baseWidth || 480;
        this.baseHeight = options.baseHeight || 480;
        this.maxScale = options.maxScale || 6;
        this.canvas = options.canvas;
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.input = new InputManager();
        this.currentScene = null;
        this.lastTime = 0;
        this.pixelRatio = 1;
        this.currentScale = 1;
        this.statusEl = document.getElementById('statusInner');
        this.instructionsEl = document.getElementById('instructionsBox');
        this.titleEl = document.getElementById('titleBox');

        this.ctx.imageSmoothingEnabled = false;
        this.setupCanvas();
        window.addEventListener('resize', () => this.setupCanvas());
      }

      setupCanvas() {
        const frame = document.getElementById('gameFrame');
        const rect = frame.getBoundingClientRect();
        const availableWidth = Math.max(100, rect.width - 20);
        const availableHeight = Math.max(140, window.innerHeight * 0.62);

        const scaleX = Math.floor(availableWidth / this.baseWidth);
        const scaleY = Math.floor(availableHeight / this.baseHeight);
        this.currentScale = Math.max(1, Math.min(this.maxScale, scaleX, scaleY || 1));
        this.pixelRatio = Math.max(1, Math.floor(window.devicePixelRatio || 1));
        const internalScale = this.currentScale * this.pixelRatio;

        this.canvas.width = this.baseWidth * internalScale;
        this.canvas.height = this.baseHeight * internalScale;
        this.canvas.style.width = `${this.baseWidth * this.currentScale}px`;
        this.canvas.style.height = `${this.baseHeight * this.currentScale}px`;

        // Scale the context so game code still draws in logical pixels.
        this.ctx.setTransform(internalScale, 0, 0, internalScale, 0, 0);
        this.ctx.imageSmoothingEnabled = false;
      }

      setScene(scene) {
        if (this.currentScene?.exit) {
          this.currentScene.exit(this);
        }
        this.currentScene = scene;
        if (this.currentScene?.enter) {
          this.currentScene.enter(this);
        }
      }

      setTitle(text) {
        this.titleEl.textContent = text;
      }

      setStatus(text) {
        this.statusEl.textContent = text;
      }

      setInstructions(text) {
        this.instructionsEl.textContent = text;
      }

      start() {
        this.input.bindTouchButtons('[data-key]');
        requestAnimationFrame((t) => this.loop(t));
      }

      loop(timestamp) {
        if (!this.lastTime) {
          this.lastTime = timestamp;
        }

        let dt = (timestamp - this.lastTime) / 1000;
        if (dt > 0.033) {
          dt = 0.033;
        }
        this.lastTime = timestamp;

        this.input.pollGamepad();
        if (this.currentScene?.update) {
          this.currentScene.update(this, dt);
        }
        if (this.currentScene?.draw) {
          this.currentScene.draw(this, this.ctx);
        }

        this.input.endFrame();
        requestAnimationFrame((t) => this.loop(t));
      }
    }

    function runLayoutTests() {
      // Lightweight assertions make layout regressions easier to spot.
      console.assert(document.getElementById('topBar'), 'top bar should exist');
      console.assert(document.getElementById('statusInner'), 'status box should exist');
      console.assert(document.getElementById('instructionsBox'), 'instructions box should exist');
      console.assert(document.getElementById('actionPad'), 'action pad should exist');
      console.assert(document.getElementById('utilityPad'), 'utility pad should exist');
      console.assert(document.getElementById('reverseToggle'), 'reverse toggle should exist');
      console.assert(
        document.querySelectorAll('#rightControls [data-key]').length === 4,
        'right side should have four visible face buttons'
      );
      console.assert(
        document.querySelectorAll('#centerControls [data-key]').length === 2,
        'centre strip should have Start and Select buttons'
      );
      console.assert(
        document.querySelectorAll('#leftControls [data-key]').length === 4,
        'left side should have four arrow buttons'
      );
    }

    function runReverseLayoutTests() {
      // Verify the label-toggle class is applied and removed correctly.
      const actionPad = document.getElementById('actionPad');
      console.assert(actionPad, 'action pad must exist for reverse-layout tests');

      applyReverseLayout(false);
      console.assert(!actionPad.classList.contains('reversed'), 'action pad should not be reversed by default');

      applyReverseLayout(true);
      console.assert(actionPad.classList.contains('reversed'), 'action pad should be reversed when enabled');

      applyReverseLayout(false);
      console.assert(!actionPad.classList.contains('reversed'), 'action pad should return to normal when disabled');
    }

    function runMenuOverlayTests() {
      const app = document.getElementById('app');
      const menuPanel = document.getElementById('menuPanel');
      console.assert(getComputedStyle(app).position === 'relative', 'app should anchor overlay menu positioning');
      console.assert(getComputedStyle(menuPanel).position === 'absolute', 'menu panel should overlay instead of affecting layout flow');
      console.assert(Number.parseInt(getComputedStyle(menuPanel).zIndex || '0', 10) > 0, 'menu panel should sit above other content');
    }

    function runUtilityInputTests() {
      // Verify Start / Select buttons exist and map to the intended logical inputs.
      const utilityButtons = [...document.querySelectorAll('#utilityPad [data-key]')].map((el) => el.dataset.key);
      console.assert(utilityButtons.includes('Enter'), 'utility strip should expose Start via Enter');
      console.assert(utilityButtons.includes('ShiftLeft'), 'utility strip should expose Select via ShiftLeft');
    }

    function applyReverseLayout(enabled) {
      const actionPad = document.getElementById('actionPad');
      actionPad.classList.toggle('reversed', enabled);
      localStorage.setItem('reverseButtons', enabled ? '1' : '0');
    }

    function wireTopButtons(engine) {
      const menuButton = document.getElementById('menuButton');
      const closeButton = document.getElementById('closeButton');
      const menuPanel = document.getElementById('menuPanel');
      const toggle = document.getElementById('reverseToggle');

      // Close the popup when clicking/tapping outside it.
      document.addEventListener('pointerdown', (event) => {
        const clickedMenuButton = menuButton.contains(event.target);
        const clickedInsideMenu = menuPanel.contains(event.target);
        if (!menuPanel.hidden && !clickedMenuButton && !clickedInsideMenu) {
          menuPanel.hidden = true;
          engine.setStatus('STATUS: READY');
        }
      });

      menuButton.addEventListener('click', () => {
        menuPanel.hidden = !menuPanel.hidden;
        engine.setStatus(menuPanel.hidden ? 'STATUS: READY' : 'STATUS: MENU OPEN');
      });

      closeButton.addEventListener('click', () => {
        engine.setStatus('STATUS: CLOSE BUTTON PRESSED');
      });

      toggle.addEventListener('change', () => {
        applyReverseLayout(toggle.checked);
        engine.setStatus(toggle.checked ? 'STATUS: BUTTONS REVERSED' : 'STATUS: NORMAL BUTTONS');
      });
    }

    function boot() {
      runLayoutTests();
      runReverseLayoutTests();
      runMenuOverlayTests();
      runUtilityInputTests();

      const engine = new GameEngine({
        canvas: document.getElementById('game'),
        baseWidth: 480,
        baseHeight: 480,
        maxScale: 6,
      });

      const saved = localStorage.getItem('reverseButtons') === '1';
      const toggle = document.getElementById('reverseToggle');
      if (toggle) {
        toggle.checked = saved;
      }
      applyReverseLayout(saved);

      engine.setTitle('RETRO FRAMEWORK DEMO');
      engine.setStatus('STATUS: READY');
      engine.setInstructions('ARROWS OR DPAD TO MOVE. HOLD A TO DRAW. START PAUSES. SELECT IS AVAILABLE FOR SECONDARY FUNCTIONS.');
      wireTopButtons(engine);
      engine.setScene(new DemoScene());
      engine.start();

      // Expose the engine in dev tools for quick experiments.
      window.framework = engine;
    }

    boot();
  </script>
