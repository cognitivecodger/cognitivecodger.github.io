<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Retro Game Framework</title>
  <style>
    :root {
      /* Shared colour palette for the wrapper and controls. */
      --bg: #101414;
      --panel: #182020;
      --panel-border: #2b3b3b;
      --text: #d7f5dd;
      --accent: #57ff93;
      --danger: #ff5f5f;
      --btn: #273232;
      --btn-active: #3a4b4b;
      --shadow: rgba(0, 0, 0, 0.35);

      /* Responsive control sizing.
         clamp(min, preferred, max) lets the buttons grow with screen size
         without becoming too tiny on phones or too huge on desktops. */
      --control-cell: clamp(42px, 7vw, 74px);
      --control-gap: clamp(3px, 0.8vw, 6px); /* Reduced gap so buttons can grow larger */
      --action-cell: clamp(48px, 7.8vw, 84px);
      --outer-pad: clamp(8px, 2vw, 20px);
      --topbar-btn: clamp(40px, 5vw, 44px);
    }

    * {
      /* Keep layout maths predictable when padding and borders are used. */
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #182121, #0d1111 55%);
      color: var(--text);
      font-family: Arial, sans-serif;

      /* Allow vertical scrolling if the whole shell is taller than the phone. */
      overflow-x: hidden;
      overflow-y: auto;

      /* Reduce browser gesture interference on touch controls. */
      touch-action: manipulation;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    #app {
      width: 100%;
      max-width: 1180px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 10px;
      gap: 10px;
    }

    .panel {
      /* Shared retro-window style for all wrapper panels. */
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.12));
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: 0 10px 30px var(--shadow);
    }

    #topBar {
      /* Menu button, title, close button. */
      display: grid;
      grid-template-columns: var(--topbar-btn) 1fr var(--topbar-btn);
      align-items: center;
      min-height: 56px;
      padding: 6px;
      gap: 8px;
    }

    #titleBox {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #294040;
      background: rgba(18, 28, 28, 0.92);
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    #gameFrame {
      /* Outer shell around the playable canvas. */
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    canvas {
      display: block;

      /* Keep the canvas visually large while using a fixed logical game size. */
      width: min(100%, 1120px);
      height: auto;
      aspect-ratio: 16 / 9;

      background: #000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #1d2a2a;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    #statusBox,
    #controlRow,
    #instructionsPanel {
      padding: 8px;
    }

    #statusInner,
    #instructionsBox {
      /* These are plain HTML information panels rather than sprite-text panels. */
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #294040;
      background: rgba(18, 28, 28, 0.92);
      text-align: center;
      line-height: 1.35;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }

    #instructionsBox {
      font-size: clamp(14px, 2.2vw, 20px);
    }

    #statusInner {
      font-size: clamp(16px, 2.3vw, 22px);
    }

    #controlRow {
      /* Three control zones:
         left  = d-pad 3x3
         middle = utility 3x3 with centre pause button
         right = action 3x3 with A and B on the middle row */
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    #leftControls,
    #centerControls,
    #rightControls {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(var(--control-cell) * 3 + var(--control-gap) * 2 + 16px);
    }

    #leftControls {
      justify-content: flex-start;
      padding-left: var(--outer-pad);
    }

    #centerControls {
      justify-content: center;
      padding-left: 8px;
      padding-right: 8px;
    }

    #rightControls {
      justify-content: flex-end;
      padding-right: var(--outer-pad);
    }

    .controlGrid {
      /* Generic 3x3 control matrix used by d-pad, utility pad, and action pad. */
      display: grid;
      grid-template-columns: repeat(3, var(--control-cell));
      grid-template-rows: repeat(3, var(--control-cell));
      gap: var(--control-gap);
      width: max-content;
    }

    .actionGrid {
      /* Action pad uses its own cell size so A/B can be slightly larger than arrows. */
      grid-template-columns: repeat(3, var(--action-cell));
      grid-template-rows: repeat(3, var(--action-cell));
    }

    .btn,
    .ghost {
      /* Base button style used for all visible controls and hidden spacer cells. */
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: clamp(12px, 1.7vw, 18px);
      background: var(--btn);
      color: var(--text);
      font-size: clamp(18px, 2.5vw, 26px);
      font-weight: bold;
      box-shadow: 0 4px 12px var(--shadow), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      touch-action: manipulation;
      cursor: pointer;
    }

    .btn:active,
    .btn.active {
      /* Visual feedback for touch and mouse presses. */
      transform: translateY(1px) scale(0.98);
      background: var(--btn-active);
    }

    .fire {
      /* A/B remain circular and slightly larger than the d-pad arrows. */
      border-radius: 50%;
      font-size: clamp(18px, 2.3vw, 22px);
    }

    .pauseBtn {
      /* Pause sits in the centre utility pad, ready for later functionality. */
      border-radius: 50%;
      background: #374444;
      font-size: clamp(14px, 1.8vw, 18px);
      letter-spacing: 0.04em;
    }

    .fireA {
      background: #254d2f;
    }

    .fireB {
      background: #5a2f1f;
    }

    .iconBtn {
      /* Menu and close buttons in the title bar. */
      width: var(--topbar-btn);
      height: var(--topbar-btn);
      border-radius: 12px;
      font-size: clamp(18px, 2vw, 20px);
    }

    .ghost {
      /* Hidden placeholders preserve the 3x3 control geometry without being clickable. */
      visibility: hidden;
      pointer-events: none;
    }

    @media (max-width: 860px) {
      #app {
        padding: 8px;
      }

      #topBar {
        min-height: 52px;
      }

      #titleBox {
        min-height: 38px;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
      }

      #controlRow {
        /* Keep all three control groups side-by-side on mobile.
           Fluid columns plus clamp-sized cells stop them colliding. */
        gap: 6px;
      }

      #leftControls {
        padding-left: 8px;
      }

      #centerControls {
        padding-left: 4px;
        padding-right: 4px;
      }

      #rightControls {
        padding-right: 8px;
      }

      #instructionsBox,
      #statusInner {
        min-height: 48px;
      }
    }

    @media (max-width: 520px) {
      :root {
        /* On narrower phones, trim the preferred sizes slightly so all three pads fit. */
        --control-cell: clamp(34px, 9vw, 50px);
        --control-gap: clamp(4px, 1vw, 6px);
        --action-cell: clamp(38px, 10vw, 58px);
        --outer-pad: clamp(4px, 1vw, 8px);
      }

      #controlRow {
        gap: 4px;
      }

      #instructionsBox {
        font-size: 13px;
      }

      #statusInner {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topBar" class="panel">
      <button id="menuButton" class="btn iconBtn" type="button" aria-label="Menu">☰</button>
      <div id="titleBox">RETRO FRAMEWORK DEMO</div>
      <button id="closeButton" class="btn iconBtn" type="button" aria-label="Close">✕</button>
    </div>

    <div id="gameFrame" class="panel">
      <canvas id="game" aria-label="Game canvas"></canvas>
    </div>

    <div id="statusBox" class="panel">
      <div id="statusInner">STATUS: READY</div>
    </div>

    <div id="controlRow" class="panel">
      <div id="leftControls">
        <!-- D-pad uses a 3x3 grid with hidden cells to preserve the cross shape. -->
        <div class="controlGrid" id="dpad">
          <div class="ghost"></div>
          <button class="btn" data-key="ArrowUp" type="button" aria-label="Up">▲</button>
          <div class="ghost"></div>

          <button class="btn" data-key="ArrowLeft" type="button" aria-label="Left">◀</button>
          <div class="ghost"></div>
          <button class="btn" data-key="ArrowRight" type="button" aria-label="Right">▶</button>

          <div class="ghost"></div>
          <button class="btn" data-key="ArrowDown" type="button" aria-label="Down">▼</button>
          <div class="ghost"></div>
        </div>
      </div>

      <div id="centerControls">
        <!-- Utility pad uses the same 3x3 idea.
             Only the centre button is visible for now, acting as pause/menu. -->
        <div class="controlGrid" id="utilityPad">
          <div class="ghost"></div>
          <div class="ghost"></div>
          <div class="ghost"></div>

          <div class="ghost"></div>
          <button class="btn pauseBtn" data-key="Escape" type="button" aria-label="Pause">II</button>
          <div class="ghost"></div>

          <div class="ghost"></div>
          <div class="ghost"></div>
          <div class="ghost"></div>
        </div>
      </div>

      <div id="rightControls">
        <!-- Action pad also uses a 3x3 grid.
             A and B sit on the middle left and middle right cells as requested:
             [ ][ ][ ]
             [A][ ][B]
             [ ][ ][ ] -->
        <div class="controlGrid actionGrid" id="actionPad">
          <div class="ghost"></div>
          <div class="ghost"></div>
          <div class="ghost"></div>

          <button class="btn fire fireA" data-key="KeyZ" type="button" aria-label="Button A">A</button>
          <div class="ghost"></div>
          <button class="btn fire fireB" data-key="KeyX" type="button" aria-label="Button B">B</button>

          <div class="ghost"></div>
          <div class="ghost"></div>
          <div class="ghost"></div>
        </div>
      </div>
    </div>

    <div id="instructionsPanel" class="panel">
      <div id="instructionsBox">
        ARROWS OR DPAD TO MOVE. HOLD A TO DRAW. B IS AVAILABLE FOR A SECOND ACTION LATER.
      </div>
    </div>
  </div>

  <script>
    class InputManager {
      constructor() {
        // Current pressed state for each logical input code.
        this.keys = new Map();

        // Inputs that changed from “up” to “down” this frame only.
        this.justPressed = new Set();

        // References to all on-screen buttons once bound.
        this.mobileButtons = [];

        this.setupKeyboard();
      }

      setupKeyboard() {
        // Keyboard input is mapped to the same logical codes used by touch buttons.
        window.addEventListener('keydown', (e) => {
          const code = e.code;

          // Prevent browser scrolling or default actions for control keys.
          if ([
            'ArrowUp',
            'ArrowDown',
            'ArrowLeft',
            'ArrowRight',
            'Space',
            'Enter',
            'Escape',
            'KeyZ',
            'KeyX'
          ].includes(code)) {
            e.preventDefault();
          }

          // Track the first frame of a key press separately from “held”.
          if (!this.keys.get(code)) {
            this.justPressed.add(code);
          }

          this.keys.set(code, true);
        });

        window.addEventListener('keyup', (e) => {
          this.keys.set(e.code, false);
        });
      }

      bindTouchButtons(selector = '[data-key]') {
        // Buttons declare which logical input they trigger using data-key.
        this.mobileButtons = [...document.querySelectorAll(selector)];

        const press = (button, e) => {
          e.preventDefault();
          const code = button.dataset.key;

          if (!this.keys.get(code)) {
            this.justPressed.add(code);
          }

          this.keys.set(code, true);
          button.classList.add('active');
        };

        const release = (button, e) => {
          e.preventDefault();
          const code = button.dataset.key;
          this.keys.set(code, false);
          button.classList.remove('active');
        };

        for (const button of this.mobileButtons) {
          // Touch listeners for real phones and tablets.
          button.addEventListener('touchstart', (e) => press(button, e), { passive: false });
          button.addEventListener('touchend', (e) => release(button, e), { passive: false });
          button.addEventListener('touchcancel', (e) => release(button, e), { passive: false });

          // Mouse listeners are still useful for desktop testing.
          button.addEventListener('mousedown', (e) => press(button, e));
          button.addEventListener('mouseup', (e) => release(button, e));
          button.addEventListener('mouseleave', (e) => release(button, e));
        }
      }

      pollGamepad() {
        // Poll the first connected controller each frame.
        const pads = navigator.getGamepads ? navigator.getGamepads() : [];
        const pad = pads && pads[0];
        if (!pad) return;

        // Dead zone avoids unwanted analogue drift.
        const dead = 0.35;

        const gamepadStates = {
          ArrowLeft: pad.axes[0] < -dead || !!pad.buttons[14]?.pressed,
          ArrowRight: pad.axes[0] > dead || !!pad.buttons[15]?.pressed,
          ArrowUp: pad.axes[1] < -dead || !!pad.buttons[12]?.pressed,
          ArrowDown: pad.axes[1] > dead || !!pad.buttons[13]?.pressed,
          KeyZ: !!pad.buttons[0]?.pressed,
          KeyX: !!pad.buttons[1]?.pressed,
          Enter: !!pad.buttons[9]?.pressed,
          Escape: !!pad.buttons[8]?.pressed,
        };

        for (const [code, pressed] of Object.entries(gamepadStates)) {
          if (pressed && !this.keys.get(code)) {
            this.justPressed.add(code);
          }

          this.keys.set(code, !!pressed);
        }
      }

      down(code) {
        // True while an input is actively held.
        return !!this.keys.get(code);
      }

      pressed(code) {
        // True only on the first frame the input becomes active.
        return this.justPressed.has(code);
      }

      endFrame() {
        // Reset one-frame press information after update and draw are complete.
        this.justPressed.clear();
      }
    }

    class Scene {
      // Base scene interface for future title screens, gameplay scenes, pause screens, etc.
      enter(engine) {}
      update(engine, dt) {}
      draw(engine, ctx) {}
      exit(engine) {}
    }

    class DemoScene extends Scene {
      enter(engine) {
        // Start the player near the centre of the logical 480x270 play area.
        this.player = {
          x: 232,
          y: 127,
          w: 16,
          h: 16,
          speed: 96,
          drawing: false,
          altAction: false,
          paused: false,
          trail: [],
        };

        this.score = 0;
      }

      update(engine, dt) {
        const input = engine.input;
        const p = this.player;

        // Toggle paused state with the centre utility button or Escape on keyboard/pad.
        if (input.pressed('Escape')) {
          p.paused = !p.paused;
        }

        // Pause freezes movement and action updates, but keeps the wrapper alive.
        if (!p.paused) {
          if (input.down('ArrowLeft')) p.x -= p.speed * dt;
          if (input.down('ArrowRight')) p.x += p.speed * dt;
          if (input.down('ArrowUp')) p.y -= p.speed * dt;
          if (input.down('ArrowDown')) p.y += p.speed * dt;

          // Clamp the player to the visible game area.
          p.x = Math.max(8, Math.min(engine.baseWidth - 8 - p.w, p.x));
          p.y = Math.max(8, Math.min(engine.baseHeight - 8 - p.h, p.y));

          // A = draw action, B = alternate action placeholder.
          p.drawing = input.down('KeyZ');
          p.altAction = input.down('KeyX');

          if (p.drawing) {
            p.trail.push({
              x: p.x + p.w / 2,
              y: p.y + p.h / 2,
              life: 0.24,
            });

            this.score += dt * 10;
          }

          for (const t of p.trail) {
            t.life -= dt;
          }
          p.trail = p.trail.filter((t) => t.life > 0);
        } else {
          // While paused, clear held action state so the status display stays honest.
          p.drawing = false;
          p.altAction = false;
        }

        const statusText = p.paused
          ? 'STATUS: PAUSED'
          : p.altAction
            ? 'STATUS: BUTTON B HELD'
            : p.drawing
              ? 'STATUS: DRAWING'
              : 'STATUS: READY';

        const instructionsText = p.paused
          ? 'PRESS THE CENTRE PAUSE BUTTON OR ESC AGAIN TO RESUME.'
          : p.altAction
            ? 'B CAN TRIGGER A SECOND ACTION, MENU, BOMB, OR CANCEL LATER.'
            : 'ARROWS OR DPAD TO MOVE. HOLD A TO DRAW. PRESS THE CENTRE BUTTON TO PAUSE.';

        engine.setStatus(statusText);
        engine.setInstructions(instructionsText);
      }

      draw(engine, ctx) {
        const p = this.player;

        // Clear the frame.
        ctx.fillStyle = '#050707';
        ctx.fillRect(0, 0, engine.baseWidth, engine.baseHeight);

        // Draw a simple grid background to make motion and scaling easier to judge.
        ctx.strokeStyle = '#0f1717';
        for (let x = 0; x <= engine.baseWidth; x += 16) {
          ctx.beginPath();
          ctx.moveTo(x + 0.5, 0);
          ctx.lineTo(x + 0.5, engine.baseHeight);
          ctx.stroke();
        }

        for (let y = 0; y <= engine.baseHeight; y += 16) {
          ctx.beginPath();
          ctx.moveTo(0, y + 0.5);
          ctx.lineTo(engine.baseWidth, y + 0.5);
          ctx.stroke();
        }

        // Trail particles fade out based on remaining life.
        for (const t of p.trail) {
          const alpha = Math.max(0, t.life / 0.24);
          ctx.fillStyle = `rgba(87,255,147,${0.35 * alpha})`;
          ctx.fillRect(Math.round(t.x - 1), Math.round(t.y - 1), 3, 3);
        }

        // The player colour reflects its current state.
        ctx.fillStyle = p.paused ? '#9ba7a7' : p.altAction ? '#ff9f57' : p.drawing ? '#ff7070' : '#57ff93';
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.w, p.h);

        // Tiny “eyes” add some character to the placeholder player block.
        ctx.fillStyle = '#b7ffd0';
        ctx.fillRect(Math.round(p.x + 4), Math.round(p.y + 4), 2, 2);
        ctx.fillRect(Math.round(p.x + 10), Math.round(p.y + 4), 2, 2);

        if (p.paused) {
          // Light pause overlay so the game state is obvious even without reading status text.
          ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
          ctx.fillRect(0, 0, engine.baseWidth, engine.baseHeight);

          ctx.fillStyle = '#d7f5dd';
          ctx.fillRect(engine.baseWidth / 2 - 12, engine.baseHeight / 2 - 20, 8, 40);
          ctx.fillRect(engine.baseWidth / 2 + 4, engine.baseHeight / 2 - 20, 8, 40);
        }
      }
    }

    class GameEngine {
      constructor(options = {}) {
        // Logical resolution. The visible canvas is just a scaled-up version of this. 
        this.baseWidth = options.baseWidth || 480;
        this.baseHeight = options.baseHeight || 270;
        this.maxScale = options.maxScale || 6;

        this.canvas = options.canvas;
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.input = new InputManager();
        this.currentScene = null;
        this.lastTime = 0;
        this.pixelRatio = 1;
        this.currentScale = 1;

        // Cache wrapper panel references so scenes can update them efficiently.
        this.statusEl = document.getElementById('statusInner');
        this.instructionsEl = document.getElementById('instructionsBox');
        this.titleEl = document.getElementById('titleBox');

        this.ctx.imageSmoothingEnabled = false;
        this.setupCanvas();

        // Recalculate on resize or device rotation.
        window.addEventListener('resize', () => this.setupCanvas());
      }

      setupCanvas() {
        const frame = document.getElementById('gameFrame');
        const rect = frame.getBoundingClientRect();

        // Measure the practical space available inside the canvas frame.
        const availableWidth = Math.max(100, rect.width - 20);
        const availableHeight = Math.max(140, window.innerHeight * 0.62);

        const scaleX = Math.floor(availableWidth / this.baseWidth);
        const scaleY = Math.floor(availableHeight / this.baseHeight);

        // Integer scaling helps keep the retro look crisp instead of blurry.
        this.currentScale = Math.max(1, Math.min(this.maxScale, scaleX, scaleY || 1));

        // Use device pixel ratio for sharper results on dense mobile screens.
        this.pixelRatio = Math.max(1, Math.floor(window.devicePixelRatio || 1));

        const internalScale = this.currentScale * this.pixelRatio;

        // Internal drawing buffer size.
        this.canvas.width = this.baseWidth * internalScale;
        this.canvas.height = this.baseHeight * internalScale;

        // Visual size seen in the browser.
        this.canvas.style.width = `${this.baseWidth * this.currentScale}px`;
        this.canvas.style.height = `${this.baseHeight * this.currentScale}px`;

        // Scale the context so game code still draws in logical pixels.
        this.ctx.setTransform(internalScale, 0, 0, internalScale, 0, 0);
        this.ctx.imageSmoothingEnabled = false;
      }

      setScene(scene) {
        if (this.currentScene?.exit) {
          this.currentScene.exit(this);
        }

        this.currentScene = scene;

        if (this.currentScene?.enter) {
          this.currentScene.enter(this);
        }
      }

      setTitle(text) {
        this.titleEl.textContent = text;
      }

      setStatus(text) {
        this.statusEl.textContent = text;
      }

      setInstructions(text) {
        this.instructionsEl.textContent = text;
      }

      start() {
        // Bind visible on-screen controls to the input manager.
        this.input.bindTouchButtons('[data-key]');
        requestAnimationFrame((t) => this.loop(t));
      }

      loop(timestamp) {
        if (!this.lastTime) {
          this.lastTime = timestamp;
        }

        // Convert milliseconds to seconds for movement logic.
        let dt = (timestamp - this.lastTime) / 1000;

        // Clamp huge time jumps after tab switching so objects do not leap across the screen.
        if (dt > 0.033) {
          dt = 0.033;
        }

        this.lastTime = timestamp;

        this.input.pollGamepad();

        if (this.currentScene?.update) {
          this.currentScene.update(this, dt);
        }

        if (this.currentScene?.draw) {
          this.currentScene.draw(this, this.ctx);
        }

        this.input.endFrame();
        requestAnimationFrame((t) => this.loop(t));
      }
    }

    function runLayoutTests() {
      // A few lightweight assertions make layout regressions easier to spot.
      console.assert(document.getElementById('topBar'), 'top bar should exist');
      console.assert(document.getElementById('statusInner'), 'status box should exist');
      console.assert(document.getElementById('instructionsBox'), 'instructions box should exist');
      console.assert(document.getElementById('utilityPad'), 'centre utility pad should exist');
      console.assert(
        document.querySelectorAll('#rightControls [data-key]').length === 2,
        'right side should have two action buttons'
      );
      console.assert(
        document.querySelectorAll('#leftControls [data-key]').length === 4,
        'left side should have four arrow buttons'
      );
      console.assert(
        document.querySelectorAll('#centerControls [data-key]').length === 1,
        'centre controls should have one visible utility button'
      );
    }

    function wireTopButtons(engine) {
      // Simple placeholders for future menu/close behaviour.
      document.getElementById('menuButton').addEventListener('click', () => {
        engine.setStatus('STATUS: MENU BUTTON PRESSED');
      });

      document.getElementById('closeButton').addEventListener('click', () => {
        engine.setStatus('STATUS: CLOSE BUTTON PRESSED');
      });
    }

    function boot() {
      runLayoutTests();

      const engine = new GameEngine({
        canvas: document.getElementById('game'),
        baseWidth: 480,
        baseHeight: 270,
        maxScale: 6,
      });

      engine.setTitle('RETRO FRAMEWORK DEMO');
      engine.setStatus('STATUS: READY');
      engine.setInstructions(
        'ARROWS OR DPAD TO MOVE. HOLD A TO DRAW. PRESS THE CENTRE BUTTON TO PAUSE.'
      );

      wireTopButtons(engine);
      engine.setScene(new DemoScene());
      engine.start();

      // Expose the engine in dev tools for quick experiments.
      window.framework = engine;
    }

    boot();
  </script>
</body>
